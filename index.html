<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstrumentSafe - Registro Seguro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: rgba(15, 23, 42, 0.95);
      padding: 1rem 0;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 28px; font-weight: 700; color: #60a5fa; text-align: center; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .tab { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
    .tab-btn {
      padding: 14px 28px;
      background: #1e2937;
      color: #cbd5e1;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .tab-btn.active {
      background: #3b82f6;
      color: white;
    }
    .card {
      background: #1e2937;
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    input, select, textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }
    button {
      padding: 14px 32px;
      background: #22c55e;
      color: black;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
    }
    label { color: #94a3b8; display: block; margin-top: 18px; font-weight: 500; }
    h2 { color: #60a5fa; margin-bottom: 25px; }
  </style>
</head>
<body>
  <header><div class="logo">🎸 InstrumentSafe</div></header>

  <div class="container">
    <div class="tab">
      <button class="tab-btn active" onclick="openTab(0)">Registrar Instrumento</button>
      <button class="tab-btn" onclick="openTab(1)">Consultar por Serial</button>
      <button class="tab-btn" onclick="openTab(2)">Mis Instrumentos</button>
    </div>

    <!-- REGISTRO -->
    <div class="section active card" id="tab0">
      <h2>📋 Registro de Instrumento</h2>
      
      <input type="text" id="propietario" placeholder="Nombre completo del propietario">
      <input type="text" id="serial" placeholder="Número de Serie *">
      <input type="text" id="marca" placeholder="Marca">
      <input type="text" id="modelo" placeholder="Modelo">

      <label>Tipo de Instrumento - Categoría</label>
      <select id="categoria" onchange="actualizarSubcategoria()">
        <option value="">Seleccione Categoría</option>
        <option value="Viento Madera">Viento Madera</option>
        <option value="Viento Metal">Viento Metal</option>
        <option value="Cuerda">Cuerda</option>
        <option value="Percusión">Percusión</option>
        <option value="Teclado">Teclado</option>
        <option value="Otros">Otros</option>
      </select>

      <label>Subcategoría</label>
      <select id="subcategoria">
        <option value="">Seleccione Subcategoría</option>
      </select>

      <label>✍️ Comentarios Generales del Instrumento</label>
      <textarea id="comentarios" rows="4" placeholder="Detalles adicionales, accesorios, condiciones especiales, etc..."></textarea>

      <label>Estado del Instrumento</label>
      <select id="estado">
        <option value="">Seleccione Estado</option>
        <option value="Nuevo">Nuevo</option>
        <option value="En Uso">En Uso</option>
      </select>

      <label>Tipo de Institución</label>
      <select id="tipoInstitucion">
        <option value="">Seleccione Tipo</option>
        <option value="Pública">Pública</option>
        <option value="Privada">Privada</option>
      </select>
      <input type="text" id="nombreInstitucion" placeholder="Nombre de la institución">

      <label>📄 Datos de la Factura</label>
      <input type="text" id="numeroFactura" placeholder="Número de Factura">
      <input type="text" id="tiendaCompra" placeholder="Nombre de la Tienda / Empresa">
      <input type="file" id="fotoFactura" accept="image/*">

      <label>📸 Fotografías del Instrumento (hasta 3)</label>
      <input type="file" id="foto1" accept="image/*">
      <input type="file" id="foto2" accept="image/*">
      <input type="file" id="foto3" accept="image/*">

      <button onclick="registrarInstrumento()">Registrar Instrumento</button>
    </div>

    <!-- CONSULTA -->
    <div class="section card" id="tab1">
      <h2>🔎 Consultar Instrumento</h2>
      <input type="text" id="buscarSerial" placeholder="Ingresa el Número de Serie">
      <button onclick="consultarSerial()">Buscar</button>
      <div id="resultadoConsulta" class="result"></div>
    </div>

    <!-- MIS INSTRUMENTOS -->
    <div class="section card" id="tab2">
      <h2>🎵 Mis Instrumentos Registrados</h2>
      <button onclick="mostrarMisInstrumentos()">Actualizar Lista</button>
      <div id="listaInstrumentos" class="result"></div>
    </div>
  </div>

  <script>
    let instrumentos = JSON.parse(localStorage.getItem('instrumentos')) || [];

    const subcategorias = {
      "Viento Madera": ["Flauta Transversal", "Piccolo", "Clarinete Requinto", "Clarinete Soprano", "Clarinete Alto", "Oboe", "Fagot", "Corno Inglés"],
      "Viento Metal": ["Trompeta en Sib", "Trompeta en Do", "Fliscorno", "Corno", "Trombón Tenor", "Trombón Bajo", "Eufonio", "Tuba", "Sousafón"],
      "Cuerda": ["Cuerda Frotada", "Cuerda Pulsada"],
      "Percusión": ["Batería", "Tambor", "Marimba", "Congas"],
      "Teclado": ["Piano", "Teclado", "Órgano"],
      "Otros": ["Otros"]
    };

    function actualizarSubcategoria() {
      const categoria = document.getElementById('categoria').value;
      const subSelect = document.getElementById('subcategoria');
      subSelect.innerHTML = '<option value="">Seleccione Subcategoría</option>';

      if (subcategorias[categoria]) {
        subcategorias[categoria].forEach(sub => {
          const option = document.createElement('option');
          option.value = sub;
          option.textContent = sub;
          subSelect.appendChild(option);
        });
      }
    }

    function registrarInstrumento() {
      const serial = document.getElementById('serial').value.trim();
      if (!serial) {
        alert("⚠️ El número de serie es obligatorio");
        return;
      }

      const nuevo = {
        id: Date.now(),
        propietario: document.getElementById('propietario').value,
        serial: serial.toUpperCase(),
        marca: document.getElementById('marca').value,
        modelo: document.getElementById('modelo').value,
        categoria: document.getElementById('categoria').value,
        subcategoria: document.getElementById('subcategoria').value,
        comentarios: document.getElementById('comentarios').value,
        estado: document.getElementById('estado').value,
        tipoInstitucion: document.getElementById('tipoInstitucion').value,
        nombreInstitucion: document.getElementById('nombreInstitucion').value,
        numeroFactura: document.getElementById('numeroFactura').value,
        tiendaCompra: document.getElementById('tiendaCompra').value,
        fecha: new Date().toLocaleDateString('es-ES')
      };

      instrumentos.push(nuevo);
      localStorage.setItem('instrumentos', JSON.stringify(instrumentos));
      
      alert("✅ Instrumento registrado correctamente");
      limpiarFormulario();
    }

    function consultarSerial() {
      const serial = document.getElementById('buscarSerial').value.trim().toUpperCase();
      const resultado = document.getElementById('resultadoConsulta');
      const encontrado = instrumentos.find(i => i.serial === serial);
      
      if (encontrado) {
        resultado.innerHTML = `
          <strong>✅ Instrumento Encontrado</strong><br><br>
          ${encontrado.categoria} → ${encontrado.subcategoria}<br>
          ${encontrado.marca} ${encontrado.modelo}<br>
          Propietario: ${encontrado.propietario}<br>
          Comentarios: ${encontrado.comentarios || 'Sin comentarios'}
        `;
      } else {
        resultado.innerHTML = `<strong style="color:#ef4444;">❌ Instrumento NO encontrado.</strong>`;
      }
    }

    function mostrarMisInstrumentos() {
      const lista = document.getElementById('listaInstrumentos');
      if (instrumentos.length === 0) {
        lista.innerHTML = "<p>Aún no tienes instrumentos registrados.</p>";
        return;
      }

      let html = "<ul style='list-style:none; padding:0;'>";
      instrumentos.forEach(inst => {
        html += `
          <li style="padding:15px; background:#0f172a; margin:10px 0; border-radius:10px;">
            <strong>${inst.categoria} - ${inst.subcategoria}</strong><br>
            ${inst.marca} ${inst.modelo} | Serial: ${inst.serial}
          </li>`;
      });
      html += "</ul>";
      lista.innerHTML = html;
    }

    function limpiarFormulario() {
      document.getElementById('propietario').value = '';
      document.getElementById('serial').value = '';
      document.getElementById('marca').value = '';
      document.getElementById('modelo').value = '';
      document.getElementById('categoria').value = '';
      document.getElementById('subcategoria').value = '';
      document.getElementById('comentarios').value = '';
      document.getElementById('estado').value = '';
      document.getElementById('tipoInstitucion').value = '';
      document.getElementById('nombreInstitucion').value = '';
      document.getElementById('numeroFactura').value = '';
      document.getElementById('tiendaCompra').value = '';
    }

    function openTab(n) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
      document.querySelectorAll('.tab-btn')[n].classList.add('active');
    }
  </script>
</body>
</html>
